                       <note>
                          <p>This functionality is only supported for objects in the Amazon S3 Express One Zone storage class in
                      directory buckets.</p>
                       </note>
          schema: 
            type: string
      requestBody: 
        description: |
            Request payload format varies depending on the operation:
            - **CopyObject**: Request payload for CopyObject
            - **PutObject**: Object data payload
        required: true
        content: 
          application/xml: 
            schema: 
              type: object
              description: XML structure for CopyObject
          application/octet-stream: 
            schema: 
              type: string
              format: binary
      responses: 
        200: 
          description: Successful response
          headers: 
            x-amz-expiration: 
              description: |
                  <p>If the expiration is configured for the object (see <a href="https://docs.aws.amazon.com/AmazonS3/latest/API/API_PutBucketLifecycleConfiguration.html">PutBucketLifecycleConfiguration</a>) in the <i>Amazon S3 User Guide</i>, the response
                        includes this header. It includes the <code>expiry-date</code> and <code>rule-id</code> key-value pairs
                        that provide information about object expiration. The value of the <code>rule-id</code> is
                        URL-encoded.</p>
                           <note>
                              <p>Object expiration information is not returned in directory buckets and this header returns the
                          value "<code>NotImplemented</code>" in all responses for directory buckets.</p>
                           </note>
              schema: 
                type: string
            x-amz-copy-source-version-id: 
              description: |
                  <p>Version ID of the source object that was copied.</p>
                           <note>
                              <p>This functionality is not supported when the source object is in a directory bucket.</p>
                           </note>
              schema: 
                type: string
            x-amz-version-id: 
              description: |
                  <p>Version ID of the object.</p>
                           <p>If you enable versioning for a bucket, Amazon S3 automatically generates a unique version ID for the
                        object being stored. Amazon S3 returns this ID in the response. When you enable versioning for a bucket, if
                        Amazon S3 receives multiple write requests for the same object simultaneously, it stores all of the objects.
                        For more information about versioning, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/dev/AddingObjectstoVersioningEnabledBuckets.html">Adding Objects to
                          Versioning-Enabled Buckets</a> in the <i>Amazon S3 User Guide</i>. For information about
                        returning the versioning state of a bucket, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/API/API_GetBucketVersioning.html">GetBucketVersioning</a>. </p>
                           <note>
                              <p>This functionality is not supported for directory buckets.</p>
                           </note>
              schema: 
                type: string
            x-amz-server-side-encryption: 
              description: |
                  <p>The server-side encryption algorithm used when you store this object in Amazon S3 or Amazon FSx.</p>
                           <note>
                              <p>When accessing data stored in Amazon FSx file systems using S3 access points, the only valid server side
                          encryption option is <code>aws:fsx</code>.</p>
                           </note>
              schema: 
                type: string
            x-amz-server-side-encryption-customer-algorithm: 
              description: |
                  <p>If server-side encryption with a customer-provided encryption key was requested, the response will
                        include this header to confirm the encryption algorithm that's used.</p>
                           <note>
                              <p>This functionality is not supported for directory buckets.</p>
                           </note>
              schema: 
                type: string
            x-amz-server-side-encryption-customer-key-MD5: 
              description: |
                  <p>If server-side encryption with a customer-provided encryption key was requested, the response will
                        include this header to provide the round-trip message integrity verification of the customer-provided
                        encryption key.</p>
                           <note>
                              <p>This functionality is not supported for directory buckets.</p>
                           </note>
              schema: 
                type: string
            x-amz-server-side-encryption-aws-kms-key-id: 
              description: "<p>If present, indicates the ID of the KMS key that was used for object encryption.</p>"
              schema: 
                type: string
            x-amz-server-side-encryption-context: 
              description: |
                  <p>If present, indicates the Amazon Web Services KMS Encryption Context to use for object encryption. The value of
                           this header is a Base64 encoded string of a UTF-8 encoded JSON, which contains the encryption context as key-value pairs. 
                           This value is stored as object metadata and automatically gets
                           passed on to Amazon Web Services KMS for future <code>GetObject</code> 
                           operations on this object.</p>
              schema: 
                type: string
            x-amz-server-side-encryption-bucket-key-enabled: 
              description: |
                  <p>Indicates whether the uploaded object uses an S3 Bucket Key for server-side encryption with
                        Key Management Service (KMS) keys (SSE-KMS).</p>
              schema: 
                type: string
            x-amz-request-charged: 
              description: ""
              schema: 
                type: string
            ETag: 
              description: |
                  <p>Entity tag for the uploaded object.</p>
                           <p>
                              <b>General purpose buckets </b> - To ensure that data is not corrupted
                        traversing the network, for objects where the ETag is the MD5 digest of the object, you can calculate
                        the MD5 while putting an object to Amazon S3 and compare the returned ETag to the calculated MD5
                        value.</p>
                           <p>
                              <b>Directory buckets </b> - The ETag for the object in a
                        directory bucket isn't the MD5 digest of the object.</p>
              schema: 
                type: string
            x-amz-checksum-crc32: 
              description: |
                  <p>The Base64 encoded, 32-bit <code>CRC32 checksum</code> of the object. This checksum is only present if the checksum was uploaded
                      with the object. When you use an API operation on an object that was uploaded using multipart uploads, this value may not be a direct checksum value of the full object. Instead, it's a calculation based on the checksum values of each individual part. For more information about how checksums are calculated
                      with multipart uploads, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/checking-object-integrity.html#large-object-checksums">
                      Checking object integrity</a> in the <i>Amazon S3 User Guide</i>.</p>
              schema: 
                type: string
            x-amz-checksum-crc32c: 
              description: |
                  <p>The Base64 encoded, 32-bit <code>CRC32C</code> checksum of the object. This checksum is only present if the checksum was uploaded
                      with the object. When you use an API operation on an object that was uploaded using multipart uploads, this value may not be a direct checksum value of the full object. Instead, it's a calculation based on the checksum values of each individual part. For more information about how checksums are calculated
                      with multipart uploads, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/checking-object-integrity.html#large-object-checksums">
                      Checking object integrity</a> in the <i>Amazon S3 User Guide</i>.</p>
              schema: 
                type: string
            x-amz-checksum-crc64nvme: 
              description: |
                  <p>The Base64 encoded, 64-bit <code>CRC64NVME</code> checksum of the object. This header is present if
                        the object was uploaded with the <code>CRC64NVME</code> checksum algorithm, or if it was uploaded
                        without a checksum (and Amazon S3 added the default checksum, <code>CRC64NVME</code>, to the uploaded
                        object). For more information about how checksums are calculated with multipart uploads, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/checking-object-integrity.html">Checking object
                          integrity in the Amazon S3 User Guide</a>.</p>
              schema: 
                type: string
            x-amz-checksum-sha1: 
              description: |
                  <p>The Base64 encoded, 160-bit <code>SHA1</code> digest of the object. This checksum is only present if the checksum was uploaded
                      with the object. When you use the API operation on an object that was uploaded using multipart uploads, this value may not be a direct checksum value of the full object. Instead, it's a calculation based on the checksum values of each individual part. For more information about how checksums are calculated
                      with multipart uploads, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/checking-object-integrity.html#large-object-checksums">
                      Checking object integrity</a> in the <i>Amazon S3 User Guide</i>.</p>
              schema: 
                type: string
            x-amz-checksum-sha256: 
              description: |
                  <p>The Base64 encoded, 256-bit <code>SHA256</code> digest of the object. This checksum is only present if the checksum was uploaded
                      with the object. When you use an API operation on an object that was uploaded using multipart uploads, this value may not be a direct checksum value of the full object. Instead, it's a calculation based on the checksum values of each individual part. For more information about how checksums are calculated
                      with multipart uploads, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/checking-object-integrity.html#large-object-checksums">
                      Checking object integrity</a> in the <i>Amazon S3 User Guide</i>.</p>
              schema: 
                type: string
            x-amz-checksum-sha512: 
              description: |
                  <p>The Base64 encoded, 512-bit <code>SHA512</code> digest of the object. This header is present if
                        the object was uploaded with the <code>SHA512</code> checksum algorithm. For more information, see
                        <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/checking-object-integrity.html">Checking
                          object integrity in the Amazon S3 User Guide</a>.</p>
              schema: 
                type: string
            x-amz-checksum-md5: 
              description: |
                  <p>The Base64 encoded, 128-bit <code>MD5</code> digest of the object. This header is present if
                        the object was uploaded with the <code>MD5</code> checksum algorithm. For more information, see
                        <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/checking-object-integrity.html">Checking
                          object integrity in the Amazon S3 User Guide</a>.</p>
              schema: 
                type: string
            x-amz-checksum-xxhash64: 
              description: |
                  <p>The Base64 encoded, 64-bit <code>XXHASH64</code> checksum of the object. This header is present if
                        the object was uploaded with the <code>XXHASH64</code> checksum algorithm. For more information, see
                        <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/checking-object-integrity.html">Checking
                          object integrity in the Amazon S3 User Guide</a>.</p>
              schema: 
                type: string
            x-amz-checksum-xxhash3: 
              description: |
                  <p>The Base64 encoded, 64-bit <code>XXHASH3</code> checksum of the object. This header is present if
                        the object was uploaded with the <code>XXHASH3</code> checksum algorithm. For more information, see
                        <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/checking-object-integrity.html">Checking
                          object integrity in the Amazon S3 User Guide</a>.</p>
              schema: 
                type: string
            x-amz-checksum-xxhash128: 
              description: |
                  <p>The Base64 encoded, 128-bit <code>XXHASH128</code> checksum of the object. This header is present if
                        the object was uploaded with the <code>XXHASH128</code> checksum algorithm. For more information, see
                        <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/checking-object-integrity.html">Checking
                          object integrity in the Amazon S3 User Guide</a>.</p>
              schema: 
                type: string
            x-amz-checksum-type: 
              description: |
                  <p>This header specifies the checksum type of the object, which determines how part-level checksums are
                        combined to create an object-level checksum for multipart objects. For <code>PutObject</code> uploads,
                        the checksum type is always <code>FULL_OBJECT</code>. You can use this header as a data integrity check
                        to verify that the checksum type that is received is the same checksum that was specified. For more
                        information, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/checking-object-integrity.html">Checking object integrity</a> in
                        the <i>Amazon S3 User Guide</i>.</p>
              schema: 
                type: string
            x-amz-object-size: 
              description: |
                  <p> The size of the object in bytes. This value is only be present if you append to an object. </p>
                           <note>
                              <p>This functionality is only supported for objects in the Amazon S3 Express One Zone storage class in
                          directory buckets.</p>
                           </note>
              schema: 
                type: string
    delete: 
      operationId: DeleteObject
      summary: DeleteObject
      description: |
          <p>Removes an object from a bucket. The behavior depends on the bucket's versioning state: </p>
                   <ul>
                      <li>
                         <p>If bucket versioning is not enabled, the operation permanently deletes the object.</p>
                      </li>
                      <li>
                         <p>If bucket versioning is enabled, the operation inserts a delete marker, which becomes the
                    current version of the object. To permanently delete an object in a versioned bucket, you must
                    include the object’s <code>versionId</code> in the request. For more information about
                    versioning-enabled buckets, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/DeletingObjectVersions.html">Deleting object versions from a
                      versioning-enabled bucket</a>.</p>
                      </li>
                      <li>
                         <p>If bucket versioning is suspended, the operation removes the object that has a null
                      <code>versionId</code>, if there is one, and inserts a delete marker that becomes the current
                    version of the object. If there isn't an object with a null <code>versionId</code>, and all versions
                    of the object have a <code>versionId</code>, Amazon S3 does not remove the object and only inserts a
                    delete marker. To permanently delete an object that has a <code>versionId</code>, you must include
                    the object’s <code>versionId</code> in the request. For more information about versioning-suspended
                    buckets, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/DeletingObjectsfromVersioningSuspendedBuckets.html">Deleting
                      objects from versioning-suspended buckets</a>.</p>
                      </li>
                   </ul>
                   <note>
                      <ul>
                         <li>
                            <p>
                               <b>Directory buckets</b> - S3 Versioning isn't enabled and supported for directory buckets. For this API operation, only the <code>null</code> value of the version ID is supported by directory buckets.
                      You can only specify <code>null</code> to the <code>versionId</code> query parameter in the
                      request.</p>
                         </li>
                         <li>
                            <p>
                               <b>Directory buckets</b> - For directory buckets, you must make requests for this API operation to the Zonal endpoint. These endpoints support virtual-hosted-style requests in the format <code>https://<i>amzn-s3-demo-bucket</i>.s3express-<i>zone-id</i>.<i>region-code</i>.amazonaws.com/<i>key-name</i>
                               </code>. Path-style requests are not supported. For more information about endpoints in Availability Zones, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/endpoint-directory-buckets-AZ.html">Regional and Zonal endpoints for directory buckets in Availability Zones</a> in the
              <i>Amazon S3 User Guide</i>. For more information about endpoints in Local Zones, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/s3-lzs-for-directory-buckets.html">Concepts for directory buckets in Local Zones</a> in the
              <i>Amazon S3 User Guide</i>.</p>
                         </li>
                      </ul>
                   </note>
                   <p>To remove a specific version, you must use the <code>versionId</code> query parameter. Using this
                query parameter permanently deletes the version. If the object deleted is a delete marker, Amazon S3 sets the
                response header <code>x-amz-delete-marker</code> to true. </p>
                   <p>If the object you want to delete is in a bucket where the bucket versioning configuration is MFA
                Delete enabled, you must include the <code>x-amz-mfa</code> request header in the DELETE
                  <code>versionId</code> request. Requests that include <code>x-amz-mfa</code> must use HTTPS. For more
                information about MFA Delete, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/dev/UsingMFADelete.html">Using MFA Delete</a> in the <i>Amazon S3 User
                  Guide</i>. To see sample requests that use versioning, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/API/RESTObjectDELETE.html#ExampleVersionObjectDelete">Sample Request</a>. </p>
                   <note>
                      <p>
                         <b>Directory buckets</b> - MFA delete is not supported by directory buckets.</p>
                   </note>
                   <p>You can delete objects by explicitly calling DELETE Object or calling (<a href="https://docs.aws.amazon.com/AmazonS3/latest/API/API_PutBucketLifecycle.html">PutBucketLifecycle</a>) to enable Amazon S3 to
                remove them for you. If you want to block users or accounts from removing or deleting objects from your
                bucket, you must deny them the <code>s3:DeleteObject</code>, <code>s3:DeleteObjectVersion</code>, and
                  <code>s3:PutLifeCycleConfiguration</code> actions. </p>
                   <note>
                      <p>
                         <b>Directory buckets</b> -
                  S3 Lifecycle is not supported by directory buckets.</p>
                   </note>
                   <dl>
                      <dt>Permissions</dt>
                      <dd>
                         <ul>
                            <li>
                               <p>
                                  <b>General purpose bucket permissions</b> - The following
                          permissions are required in your policies when your <code>DeleteObjects</code> request
                          includes specific headers.</p>
                               <ul>
                                  <li>
                                     <p>
                                        <b>
                                           <code>s3:DeleteObject</code>
                                        </b> - To
                              delete an object from a bucket, you must always have the
                                <code>s3:DeleteObject</code> permission.</p>
                                  </li>
                                  <li>
                                     <p>
                                        <b>
                                           <code>s3:DeleteObjectVersion</code>
                                        </b> - To delete a specific version of an object from a versioning-enabled
                              bucket, you must have the <code>s3:DeleteObjectVersion</code> permission.</p>
                                     <note>
                                        <p>If the <code>s3:DeleteObject</code> or <code>s3:DeleteObjectVersion</code> permissions are explicitly
                                denied in your bucket policy, attempts to delete any unversioned objects
                                result in a <code>403 Access Denied</code> error.</p>
                                     </note>
                                  </li>
                               </ul>
                            </li>
                            <li>
                               <p>
                                  <b>Directory bucket permissions</b> - To grant access to this API operation on a directory bucket, we recommend that you use the <a href="https://docs.aws.amazon.com/AmazonS3/latest/API/API_CreateSession.html">
                                     <code>CreateSession</code>
                                  </a> API operation for session-based authorization. Specifically, you grant the <code>s3express:CreateSession</code> permission to the directory bucket in a bucket policy or an IAM identity-based policy. Then, you make the <code>CreateSession</code> API call on the bucket to obtain a session token. With the session token in your request header, you can make API requests to this operation. After the session token expires, you make another <code>CreateSession</code> API call to generate a new session token for use. 
          Amazon Web Services CLI or SDKs create session and refresh the session token automatically to avoid service interruptions when a session expires. For more information about authorization, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/API/API_CreateSession.html">
                                     <code>CreateSession</code>
                                  </a>.</p>
                            </li>
                         </ul>
                      </dd>
                      <dt>HTTP Host header syntax</dt>
                      <dd>
                         <p>
                            <b>Directory buckets </b> - The HTTP Host header syntax is <code>
                               <i>Bucket-name</i>.s3express-<i>zone-id</i>.<i>region-code</i>.amazonaws.com</code>.</p>
                      </dd>
                   </dl>
                   <p>The following action is related to <code>DeleteObject</code>:</p>
                   <ul>
                      <li>
                         <p>
                            <a href="https://docs.aws.amazon.com/AmazonS3/latest/API/API_PutObject.html">PutObject</a>
                         </p>
                      </li>
                   </ul>
                   <important>
                      <p>You must URL encode any signed header values that contain spaces. For example, if your header value is <code>my  file.txt</code>, containing two spaces after <code>my</code>, you must URL encode this value to <code>my%20%20file.txt</code>.</p>
                   </important>
                   <note>
                      <p>The <code>If-Match</code> header is supported for both general purpose and directory buckets. <code>IfMatchLastModifiedTime</code> and <code>IfMatchSize</code> is only supported for directory buckets. </p>
                   </note>
      parameters: 
        - 
          name: Bucket
          in: path
          required: true
          description: |
              <p>The bucket name of the bucket containing the object. </p>
                       <p>
                          <b>Directory buckets</b> - When you use this operation with a directory bucket, you must use virtual-hosted-style requests in the format <code>
                             <i>Bucket-name</i>.s3express-<i>zone-id</i>.<i>region-code</i>.amazonaws.com</code>. Path-style requests are not supported.  Directory bucket names must be unique in the chosen Zone (Availability Zone or Local Zone). Bucket names must follow the format <code>
                             <i>bucket-base-name</i>--<i>zone-id</i>--x-s3</code> (for example, <code>
                             <i>amzn-s3-demo-bucket</i>--<i>usw2-az1</i>--x-s3</code>). For information about bucket naming
                       restrictions, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/directory-bucket-naming-rules.html">Directory bucket naming
                          rules</a> in the <i>Amazon S3 User Guide</i>.</p>
                       <p>
                          <b>Access points</b> - When you use this action with an access point for general purpose buckets, you must provide the alias of the access point in place of the bucket name or specify the access point ARN. When you use this action with an access point for directory buckets, you must provide the access point name in place of the bucket name. When using the access point ARN, you must direct requests to the access point hostname. The access point hostname takes the form <i>AccessPointName</i>-<i>AccountId</i>.s3-accesspoint.<i>Region</i>.amazonaws.com. When using this action with an access point through the Amazon Web Services SDKs, you provide the access point ARN in place of the bucket name. For more information about access point ARNs, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/using-access-points.html">Using access points</a> in the <i>Amazon S3 User Guide</i>.</p>
                       <note>
                          <p>Object Lambda access points are not supported by directory buckets.</p>
                       </note>
                       <p>
                          <b>S3 on Outposts</b> - When you use this action with S3 on Outposts, you must direct requests to the S3 on Outposts hostname. The S3 on Outposts hostname takes the 
                                   form <code>
                             <i>AccessPointName</i>-<i>AccountId</i>.<i>outpostID</i>.s3-outposts.<i>Region</i>.amazonaws.com</code>. When you use this action with S3 on Outposts, the destination bucket must be the Outposts access point ARN or the access point alias. For more information about S3 on Outposts, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/S3onOutposts.html">What is S3 on Outposts?</a> in the <i>Amazon S3 User Guide</i>.</p>
          schema: 
            type: string
        - 
          name: Key
          in: path
          required: true
          description: "<p>Key name of the object to delete.</p>"
          schema: 
            type: string
        - 
          name: x-amz-mfa
          in: header
          required: false
          description: |
              <p>The concatenation of the authentication device's serial number, a space, and the value that is
                    displayed on your authentication device. Required to permanently delete a versioned object if versioning
                    is configured with MFA delete enabled.</p>
                       <note>
                          <p>This functionality is not supported for directory buckets.</p>
                       </note>
          schema: 
            type: string
        - 
          name: versionId
          in: query
          required: false
          description: |
              <p>Version ID used to reference a specific version of the object.</p>
                       <note>
                          <p>For directory buckets in this API operation, only the <code>null</code> value of the version ID is supported.</p>
                       </note>
          schema: 
            type: string
        - 
          name: x-amz-request-payer
          in: header
          required: false
          description: ""
          schema: 
            type: string
        - 
          name: x-amz-bypass-governance-retention
          in: header
          required: false
          description: |
              <p>Indicates whether S3 Object Lock should bypass Governance-mode restrictions to process this
                    operation. To use this header, you must have the <code>s3:BypassGovernanceRetention</code>
                    permission.</p>
                       <note>
                          <p>This functionality is not supported for directory buckets.</p>
                       </note>
          schema: 
            type: boolean
        - 
          name: x-amz-expected-bucket-owner
          in: header
          required: false
          description: "<p>The account ID of the expected bucket owner. If the account ID that you provide does not match the actual owner of the bucket, the request fails with the HTTP status code <code>403 Forbidden</code> (access denied).</p>"
          schema: 
            type: string
        - 
          name: If-Match
          in: header
          required: false
          description: |
              <p>Deletes the object if the ETag (entity tag) value provided during the delete operation matches the ETag of the object in S3. 
                    If the ETag values do not match, the operation returns a <code>412 Precondition Failed</code> error.</p>
                       <p>Expects the ETag value as a string. <code>If-Match</code> does accept a string value of an '*' (asterisk) character to denote a match of any ETag.</p>
                       <p>For more information about conditional requests, see <a href="https://tools.ietf.org/html/rfc7232">RFC 7232</a>.</p>
          schema: 
            type: string
        - 
          name: x-amz-if-match-last-modified-time
          in: header
          required: false
          description: |
              <p>If present, the object is deleted only if its modification times matches the provided
                      <code>Timestamp</code>. If the <code>Timestamp</code> values do not match, the operation returns a
                      <code>412 Precondition Failed</code> error. If the <code>Timestamp</code> matches or if the object
                    doesn’t exist, the operation returns a <code>204 Success (No Content)</code> response.</p>
                       <note>
                          <p>This functionality is only supported for directory buckets.</p>
                       </note>
          schema: 
            type: string
        - 
          name: x-amz-if-match-size
          in: header
          required: false
          description: |
              <p>If present, the object is deleted only if its size matches the provided size in bytes. If the
                      <code>Size</code> value does not match, the operation returns a <code>412 Precondition Failed</code>
                    error. If the <code>Size</code> matches or if the object doesn’t exist, the operation returns a
                      <code>204 Success (No Content)</code> response.</p>
                       <note>
                          <p>This functionality is only supported for directory buckets.</p>
                       </note>
                       <important>
                          <p>You can use the <code>If-Match</code>, <code>x-amz-if-match-last-modified-time</code> and
                        <code>x-amz-if-match-size</code> conditional headers in conjunction with each-other or
                      individually.</p>
                       </important>
          schema: 
            type: string
      responses: 
        204: 
          description: Successful response
          headers: 
            x-amz-delete-marker: 
              description: |
                  <p>Indicates whether the specified object version that was permanently deleted was (true) or was not
                        (false) a delete marker before deletion. In a simple DELETE, this header indicates whether (true) or not
                        (false) the current version of the object is a delete marker. To learn more about delete markers, see
                          <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/DeleteMarker.html">Working with delete
                          markers</a>.</p>
                           <note>
                              <p>This functionality is not supported for directory buckets.</p>
                           </note>
              schema: 
                type: string
            x-amz-version-id: 
              description: |
                  <p>Returns the version ID of the delete marker created as a result of the DELETE operation.</p>
                           <note>
                              <p>This functionality is not supported for directory buckets.</p>
                           </note>
              schema: 
                type: string
            x-amz-request-charged: 
              description: ""
              schema: 
                type: string
    get: 
      operationId: GetObject
      summary: GetObject
      description: |
          <p>Retrieves an object from Amazon S3.</p>
                   <p>In the <code>GetObject</code> request, specify the full key name for the object.</p>
                   <p>
                      <b>General purpose buckets</b> - Both the virtual-hosted-style requests
                and the path-style requests are supported. For a virtual hosted-style request example, if you have the
                object <code>photos/2006/February/sample.jpg</code>, specify the object key name as
                  <code>/photos/2006/February/sample.jpg</code>. For a path-style request example, if you have the
                object <code>photos/2006/February/sample.jpg</code> in the bucket named <code>examplebucket</code>,
                specify the object key name as <code>/examplebucket/photos/2006/February/sample.jpg</code>. For more
                information about request types, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/dev/VirtualHosting.html#VirtualHostingSpecifyBucket">HTTP Host Header Bucket
                  Specification</a> in the <i>Amazon S3 User Guide</i>.</p>
                   <p>
                      <b>Directory buckets</b> -
                Only virtual-hosted-style requests are supported. For a virtual hosted-style request example, if you have the object <code>photos/2006/February/sample.jpg</code> in the bucket named <code>amzn-s3-demo-bucket--usw2-az1--x-s3</code>, specify the object key name as <code>/photos/2006/February/sample.jpg</code>. Also, when you make requests to this API operation, your requests are sent to the Zonal endpoint. These endpoints support virtual-hosted-style requests in the format <code>https://<i>bucket-name</i>.s3express-<i>zone-id</i>.<i>region-code</i>.amazonaws.com/<i>key-name</i>
                      </code>. Path-style requests are not supported. For more information about endpoints in Availability Zones, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/endpoint-directory-buckets-AZ.html">Regional and Zonal endpoints for directory buckets in Availability Zones</a> in the
              <i>Amazon S3 User Guide</i>. For more information about endpoints in Local Zones, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/s3-lzs-for-directory-buckets.html">Concepts for directory buckets in Local Zones</a> in the
              <i>Amazon S3 User Guide</i>.</p>
                   <dl>
                      <dt>Permissions</dt>
                      <dd>
                         <ul>
                            <li>
                               <p>
                                  <b>General purpose bucket permissions</b> - You must have the
                          required permissions in a policy. To use <code>GetObject</code>, you must have the
                            <code>READ</code> access to the object (or version). If you grant <code>READ</code> access
                          to the anonymous user, the <code>GetObject</code> operation returns the object without using
                          an authorization header. For more information, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/dev/using-with-s3-actions.html">Specifying permissions in a
                            policy</a> in the <i>Amazon S3 User Guide</i>.</p>
                               <p>If you include a <code>versionId</code> in your request header, you must have the
                            <code>s3:GetObjectVersion</code> permission to access a specific version of an object. The
                            <code>s3:GetObject</code> permission is not required in this scenario.</p>
                               <p>If you request the current version of an object without a specific <code>versionId</code>
                          in the request header, only the <code>s3:GetObject</code> permission is required. The
                            <code>s3:GetObjectVersion</code> permission is not required in this scenario. </p>
                               <p>If the object that you request doesn’t exist, the error that Amazon S3 returns depends on
                          whether you also have the <code>s3:ListBucket</code> permission.</p>
                               <ul>
                                  <li>
                                     <p>If you have the <code>s3:ListBucket</code> permission on the bucket, Amazon S3 returns an
                              HTTP status code <code>404 Not Found</code> error.</p>
                                  </li>
                                  <li>
                                     <p>If you don’t have the <code>s3:ListBucket</code> permission, Amazon S3 returns an HTTP
                              status code <code>403 Access Denied</code> error.</p>
                                  </li>
                               </ul>
                            </li>
                            <li>
                               <p>
                                  <b>Directory bucket permissions</b> - To grant access to this API operation on a directory bucket, we recommend that you use the <a href="https://docs.aws.amazon.com/AmazonS3/latest/API/API_CreateSession.html">
                                     <code>CreateSession</code>
                                  </a> API operation for session-based authorization. Specifically, you grant the <code>s3express:CreateSession</code> permission to the directory bucket in a bucket policy or an IAM identity-based policy. Then, you make the <code>CreateSession</code> API call on the bucket to obtain a session token. With the session token in your request header, you can make API requests to this operation. After the session token expires, you make another <code>CreateSession</code> API call to generate a new session token for use. 
          Amazon Web Services CLI or SDKs create session and refresh the session token automatically to avoid service interruptions when a session expires. For more information about authorization, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/API/API_CreateSession.html">
                                     <code>CreateSession</code>
                                  </a>.</p>
                               <p>If the object is
                          encrypted using SSE-KMS, you must also have the <code>kms:GenerateDataKey</code> and
                            <code>kms:Decrypt</code> permissions in IAM identity-based policies and KMS key policies
                          for the KMS key.</p>
                            </li>
                         </ul>
                      </dd>
                      <dt>Storage classes</dt>
                      <dd>
                         <p>If the object you are retrieving is stored in the S3 Glacier Flexible Retrieval storage class,
                      the S3 Glacier Deep Archive storage class, the S3 Intelligent-Tiering Archive Access tier, or the
                      S3 Intelligent-Tiering Deep Archive Access tier, before you can retrieve the object you must first restore a
                      copy using <a href="https://docs.aws.amazon.com/AmazonS3/latest/API/API_RestoreObject.html">RestoreObject</a>. Otherwise, this operation returns an <code>InvalidObjectState</code>
                      error. For information about restoring archived objects, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/dev/restoring-objects.html">Restoring Archived Objects</a> in the
                        <i>Amazon S3 User Guide</i>.</p>
                         <p>
                            <b>Directory buckets </b> -
                      Directory buckets only support <code>EXPRESS_ONEZONE</code> (the S3 Express One Zone storage class) in Availability Zones and <code>ONEZONE_IA</code> (the S3 One Zone-Infrequent Access storage class) in Dedicated Local Zones.  
          Unsupported storage class values won't write a destination object and will respond with the HTTP status code <code>400 Bad Request</code>.</p>
                      </dd>
                      <dt>Encryption</dt>
                      <dd>
                         <p>Encryption request headers, like <code>x-amz-server-side-encryption</code>, should not be sent
                      for the <code>GetObject</code> requests, if your object uses server-side encryption with Amazon S3
                      managed encryption keys (SSE-S3), server-side encryption with Key Management Service (KMS) keys (SSE-KMS), or
                      dual-layer server-side encryption with Amazon Web Services KMS keys (DSSE-KMS). If you include the header in
                      your <code>GetObject</code> requests for the object that uses these types of keys, you’ll get an
                      HTTP <code>400 Bad Request</code> error.</p>
                         <p>
                            <b>Directory buckets</b> -
                      For directory buckets, there are only two supported options for server-side encryption: SSE-S3 and SSE-KMS. SSE-C isn't supported. For more
                   information, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/s3-express-serv-side-encryption.html">Protecting data with server-side encryption</a> in the <i>Amazon S3 User Guide</i>.</p>
                      </dd>
                      <dt>Overriding response header values through the request</dt>
                      <dd>
                         <p>There are times when you want to override certain response header values of a
                        <code>GetObject</code> response. For example, you might override the
                        <code>Content-Disposition</code> response header value through your <code>GetObject</code>
                      request.</p>
                         <p>You can override values for a set of response headers. These modified response header values
                      are included only in a successful response, that is, when the HTTP status code <code>200 OK</code>
                      is returned. The headers you can override using the following query parameters in the request are
                      a subset of the headers that Amazon S3 accepts when you create an object. </p>
                         <p>The response headers that you can override for the <code>GetObject</code> response are
                        <code>Cache-Control</code>, <code>Content-Disposition</code>, <code>Content-Encoding</code>,
                        <code>Content-Language</code>, <code>Content-Type</code>, and <code>Expires</code>.</p>
                         <p>To override values for a set of response headers in the <code>GetObject</code> response, you
                      can use the following query parameters in the request.</p>
                         <ul>
                            <li>
                               <p>
                                  <code>response-cache-control</code>
                               </p>
                            </li>
                            <li>
                               <p>
                                  <code>response-content-disposition</code>
                               </p>
                            </li>
                            <li>
                               <p>
                                  <code>response-content-encoding</code>
                               </p>
                            </li>
                            <li>
                               <p>
                                  <code>response-content-language</code>
                               </p>
                            </li>
                            <li>
                               <p>
                                  <code>response-content-type</code>
                               </p>
                            </li>
                            <li>
                               <p>
                                  <code>response-expires</code>
                               </p>
                            </li>
                         </ul>
                         <note>
                            <p>When you use these parameters, you must sign the request by using either an Authorization
                        header or a presigned URL. These parameters cannot be used with an unsigned (anonymous)
                        request.</p>
                         </note>
                      </dd>
                      <dt>HTTP Host header syntax</dt>
                      <dd>
                         <p>
                            <b>Directory buckets </b> - The HTTP Host header syntax is <code>
                               <i>Bucket-name</i>.s3express-<i>zone-id</i>.<i>region-code</i>.amazonaws.com</code>.</p>
                      </dd>
                   </dl>
                   <p>The following operations are related to <code>GetObject</code>:</p>
                   <ul>
                      <li>
                         <p>
                            <a href="https://docs.aws.amazon.com/AmazonS3/latest/API/API_ListBuckets.html">ListBuckets</a>
                         </p>
                      </li>
                      <li>
                         <p>
                            <a href="https://docs.aws.amazon.com/AmazonS3/latest/API/API_GetObjectAcl.html">GetObjectAcl</a>
                         </p>
                      </li>
                   </ul>
                   <important>
                      <p>You must URL encode any signed header values that contain spaces. For example, if your header value is <code>my  file.txt</code>, containing two spaces after <code>my</code>, you must URL encode this value to <code>my%20%20file.txt</code>.</p>
                   </important>
