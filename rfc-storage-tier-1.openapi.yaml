openapi: 3.1.0
info: 
  title: Cloud Portable Storage API
  version: 1.0.0
  description: "A minimal, portable, S3-compatible object storage baseline API (Tier 1 Core)."
paths: 
  "/{Bucket}/{Key}": 
    put: 
      operationId: CopyObjectOrPutObject
      summary: CopyObjectOrPutObject
      description: |
          This endpoint combines multiple S3 behaviors depending on the request parameters and headers:
          
          ### CopyObject
          
          <p>Creates a copy of an object that is already stored in Amazon S3.</p>
                   <important>
                      <p>End of support notice: As of October 1, 2025, Amazon S3 has discontinued support for Email Grantee Access Control Lists (ACLs). If you attempt to use an Email Grantee ACL in a request after October 1, 2025, 
           the request will receive an <code>HTTP 405</code> (Method Not Allowed) error.</p>
                      <p>This change affects the following Amazon Web Services Regions: US East (N. Virginia), US West (N. California), US West (Oregon), Asia Pacific (Singapore), Asia Pacific (Sydney), Asia Pacific (Tokyo), Europe (Ireland), and South America (São Paulo).</p>
                   </important>
                   <note>
                      <p>You can store individual objects of up to 50 TB in Amazon S3. You create a copy of your
                  object up to 5 GB in size in a single atomic action using this API. However, to copy an
                  object greater than 5 GB, you must use the multipart upload Upload Part - Copy
                  (UploadPartCopy) API. For more information, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/dev/CopyingObjctsUsingRESTMPUapi.html">Copy Object Using the REST
                    Multipart Upload API</a>.</p>
                   </note>
                   <p>You can copy individual objects between general purpose buckets, between directory buckets, and between
                general purpose buckets and directory buckets.</p>
                   <note>
                      <ul>
                         <li>
                            <p>Amazon S3 supports copy operations using Multi-Region Access Points only as a destination when
                      using the Multi-Region Access Point ARN. </p>
                         </li>
                         <li>
                            <p>
                               <b>Directory buckets </b> - For directory buckets, you must make requests for this API operation to the Zonal endpoint. These endpoints support virtual-hosted-style requests in the format <code>https://<i>amzn-s3-demo-bucket</i>.s3express-<i>zone-id</i>.<i>region-code</i>.amazonaws.com/<i>key-name</i>
                               </code>. Path-style requests are not supported. For more information about endpoints in Availability Zones, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/endpoint-directory-buckets-AZ.html">Regional and Zonal endpoints for directory buckets in Availability Zones</a> in the
              <i>Amazon S3 User Guide</i>. For more information about endpoints in Local Zones, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/s3-lzs-for-directory-buckets.html">Concepts for directory buckets in Local Zones</a> in the
              <i>Amazon S3 User Guide</i>.</p>
                         </li>
                         <li>
                            <p>VPC endpoints don't support cross-Region requests (including copies). If you're using VPC
                      endpoints, your source and destination buckets should be in the same Amazon Web Services Region as your VPC
                      endpoint.</p>
                         </li>
                      </ul>
                   </note>
                   <p>Both the Region that you want to copy the object from and the Region that you want to copy the
                object to must be enabled for your account. For more information about how to enable a Region for your
                account, see <a href="https://docs.aws.amazon.com/accounts/latest/reference/manage-acct-regions.html#manage-acct-regions-enable-standalone">Enable
                  or disable a Region for standalone accounts</a> in the <i>Amazon Web Services Account Management
                  Guide</i>.</p>
                   <important>
                      <p>Amazon S3 transfer acceleration does not support cross-Region copies. If you request a cross-Region
                  copy using a transfer acceleration endpoint, you get a <code>400 Bad Request</code> error. For more
                  information, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/dev/transfer-acceleration.html">Transfer Acceleration</a>.</p>
                   </important>
                   <dl>
                      <dt>Authentication and authorization</dt>
                      <dd>
                         <p>All <code>CopyObject</code> requests must be authenticated and signed by using IAM
                      credentials (access key ID and secret access key for the IAM identities). All headers with the
                        <code>x-amz-</code> prefix, including <code>x-amz-copy-source</code>, must be signed. For more
                      information, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/dev/RESTAuthentication.html">REST Authentication</a>.</p>
                         <p>
                            <b>Directory buckets</b> - You must use the IAM
                      credentials to authenticate and authorize your access to the <code>CopyObject</code> API
                      operation, instead of using the temporary security credentials through the
                        <code>CreateSession</code> API operation.</p>
                         <p>Amazon Web Services CLI or SDKs handles authentication and authorization on your behalf.</p>
                      </dd>
                      <dt>Permissions</dt>
                      <dd>
                         <p>You must have <i>read</i> access to the source object and
                        <i>write</i> access to the destination bucket.</p>
                         <ul>
                            <li>
                               <p>
                                  <b>General purpose bucket permissions</b> - You must have
                          permissions in an IAM policy based on the source and destination bucket types in a
                            <code>CopyObject</code> operation.</p>
                               <ul>
                                  <li>
                                     <p>If the source object is in a general purpose bucket, you must have <b>
                                           <code>s3:GetObject</code>
                                        </b> permission to read the source object that is
                              being copied. </p>
                                  </li>
                                  <li>
                                     <p>If the destination bucket is a general purpose bucket, you must have <b>
                                           <code>s3:PutObject</code>
                                        </b> permission to write the object copy to the
                              destination bucket. </p>
                                  </li>
                               </ul>
                            </li>
                            <li>
                               <p>
                                  <b>Directory bucket permissions</b> - You must have
                          permissions in a bucket policy or an IAM identity-based policy based on the source and destination bucket types
                          in a <code>CopyObject</code> operation.</p>
                               <ul>
                                  <li>
                                     <p>If the source object that you want to copy is in a directory bucket, you must have
                              the <b>
                                           <code>s3express:CreateSession</code>
                                        </b> permission in
                              the <code>Action</code> element of a policy to read the object. If no session mode is specified, 
                              the session will be created with the maximum allowable privilege, attempting <code>ReadWrite</code> 
                              first, then <code>ReadOnly</code> if <code>ReadWrite</code> is not permitted. If you want to explicitly 
                              restrict the access to be read-only, you can set the <code>s3express:SessionMode</code> condition key to 
                              <code>ReadOnly</code> on the copy source bucket.</p>
                                  </li>
                                  <li>
                                     <p>If the copy destination is a directory bucket, you must have the <b>
                                           <code>s3express:CreateSession</code>
                                        </b> permission in the
                                <code>Action</code> element of a policy to write the object to the destination. The
                                <code>s3express:SessionMode</code> condition key can't be set to <code>ReadOnly</code>
                              on the copy destination bucket. </p>
                                  </li>
                               </ul>
                               <p>If the object is encrypted with SSE-KMS, you must also have the
                            <code>kms:GenerateDataKey</code> and <code>kms:Decrypt</code> permissions in IAM
                          identity-based policies and KMS key policies for the KMS key.</p>
                               <p>For example policies, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/s3-express-security-iam-example-bucket-policies.html">Example
                            bucket policies for S3 Express One Zone</a> and <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/s3-express-security-iam-identity-policies.html">Amazon Web Services
                            Identity and Access Management (IAM) identity-based policies for S3 Express One Zone</a> in the
                            <i>Amazon S3 User Guide</i>.</p>
                            </li>
                         </ul>
                      </dd>
                      <dt>Response and special errors</dt>
                      <dd>
                         <p>When the request is an HTTP 1.1 request, the response is chunk encoded. When the request is
                      not an HTTP 1.1 request, the response would not contain the <code>Content-Length</code>. You
                      always need to read the entire response body to check if the copy succeeds. </p>
                         <ul>
                            <li>
                               <p>If the copy is successful, you receive a response with information about the copied
                          object.</p>
                            </li>
                            <li>
                               <p>A copy request might return an error when Amazon S3 receives the copy request or while Amazon S3 is
                          copying the files. A <code>200 OK</code> response can contain either a success or an
                          error.</p>
                               <ul>
                                  <li>
                                     <p>If the error occurs before the copy action starts, you receive a standard Amazon S3
                              error.</p>
                                  </li>
                                  <li>
                                     <p>If the error occurs during the copy operation, the error response is embedded in the
                                <code>200 OK</code> response. For example, in a cross-region copy, you may encounter
                              throttling and receive a <code>200 OK</code> response. For more information, see <a href="https://repost.aws/knowledge-center/s3-resolve-200-internalerror">Resolve the Error
                                200 response when copying objects to Amazon S3</a>. The <code>200 OK</code> status code
                              means the copy was accepted, but it doesn't mean the copy is complete. Another example is
                              when you disconnect from Amazon S3 before the copy is complete, Amazon S3 might cancel the copy and
                              you may receive a <code>200 OK</code> response. You must stay connected to Amazon S3 until the
                              entire response is successfully received and processed.</p>
                                     <p>If you call this API operation directly, make sure to design your application to parse
                              the content of the response and handle it appropriately. If you use Amazon Web Services SDKs, SDKs
                              handle this condition. The SDKs detect the embedded error and apply error handling per
                              your configuration settings (including automatically retrying the request as appropriate).
                              If the condition persists, the SDKs throw an exception (or, for the SDKs that don't use
                              exceptions, they return an error).</p>
                                  </li>
                               </ul>
                            </li>
                         </ul>
                      </dd>
                      <dt>Charge</dt>
                      <dd>
                         <p>The copy request charge is based on the storage class and Region that you specify for the
                      destination object. The request can also result in a data retrieval charge for the source if the
                      source storage class bills for data retrieval. If the copy source is in a different region, the
                      data transfer is billed to the copy source account. For pricing information, see <a href="http://aws.amazon.com/s3/pricing/">Amazon S3 pricing</a>.</p>
                      </dd>
                      <dt>HTTP Host header syntax</dt>
                      <dd>
                         <ul>
                            <li>
                               <p>
                                  <b>Directory buckets </b> - The HTTP Host header syntax is <code>
                                     <i>Bucket-name</i>.s3express-<i>zone-id</i>.<i>region-code</i>.amazonaws.com</code>.</p>
                            </li>
                            <li>
                               <p>
                                  <b>Amazon S3 on Outposts</b> - When you use this action with
                          S3 on Outposts through the REST API, you must direct requests to the S3 on Outposts hostname. The
                          S3 on Outposts hostname takes the form
                              <code>
                                     <i>AccessPointName</i>-<i>AccountId</i>.<i>outpostID</i>.s3-outposts.<i>Region</i>.amazonaws.com</code>.
                          The hostname isn't required when you use the Amazon Web Services CLI or SDKs.</p>
                            </li>
                         </ul>
                      </dd>
                   </dl>
                   <p>The following operations are related to <code>CopyObject</code>:</p>
                   <ul>
                      <li>
                         <p>
                            <a href="https://docs.aws.amazon.com/AmazonS3/latest/API/API_PutObject.html">PutObject</a>
                         </p>
                      </li>
                      <li>
                         <p>
                            <a href="https://docs.aws.amazon.com/AmazonS3/latest/API/API_GetObject.html">GetObject</a>
                         </p>
                      </li>
                   </ul>
                   <important>
                      <p>You must URL encode any signed header values that contain spaces. For example, if your header value is <code>my  file.txt</code>, containing two spaces after <code>my</code>, you must URL encode this value to <code>my%20%20file.txt</code>.</p>
                   </important>
          
          ---
          
          ### PutObject
          
          <important>
                      <p>End of support notice: As of October 1, 2025, Amazon S3 has discontinued support for Email Grantee Access Control Lists (ACLs). If you attempt to use an Email Grantee ACL in a request after October 1, 2025, 
           the request will receive an <code>HTTP 405</code> (Method Not Allowed) error.</p>
                      <p>This change affects the following Amazon Web Services Regions: US East (N. Virginia), US West (N. California), US West (Oregon), Asia Pacific (Singapore), Asia Pacific (Sydney), Asia Pacific (Tokyo), Europe (Ireland), and South America (São Paulo).</p>
                   </important>
                   <p>Adds an object to a bucket.</p>
                   <note>
                      <ul>
                         <li>
                            <p>Amazon S3 never adds partial objects; if you receive a success response, Amazon S3 added the entire
                      object to the bucket. You cannot use <code>PutObject</code> to only update a single piece of
                      metadata for an existing object. You must put the entire object with updated metadata if you want
                      to update some values.</p>
                         </li>
                         <li>
                            <p>If your bucket uses the bucket owner enforced setting for Object Ownership, ACLs are disabled
                      and no longer affect permissions. All objects written to the bucket by any account will be owned
                      by the bucket owner.</p>
                         </li>
                         <li>
                            <p>
                               <b>Directory buckets</b> - For directory buckets, you must make requests for this API operation to the Zonal endpoint. These endpoints support virtual-hosted-style requests in the format <code>https://<i>amzn-s3-demo-bucket</i>.s3express-<i>zone-id</i>.<i>region-code</i>.amazonaws.com/<i>key-name</i>
                               </code>. Path-style requests are not supported. For more information about endpoints in Availability Zones, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/endpoint-directory-buckets-AZ.html">Regional and Zonal endpoints for directory buckets in Availability Zones</a> in the
              <i>Amazon S3 User Guide</i>. For more information about endpoints in Local Zones, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/s3-lzs-for-directory-buckets.html">Concepts for directory buckets in Local Zones</a> in the
              <i>Amazon S3 User Guide</i>.</p>
                         </li>
                      </ul>
                   </note>
                   <p>Amazon S3 is a distributed system. If it receives multiple write requests for the same object
                simultaneously, it overwrites all but the last object written. However, Amazon S3 provides features that can
                modify this behavior:</p>
                   <ul>
                      <li>
                         <p>
                            <b>S3 Object Lock</b> - To prevent objects from being deleted
                    or overwritten, you can use <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/object-lock.html">Amazon S3 Object Lock</a> in the <i>Amazon S3 User Guide</i>.</p>
                         <note>
                            <p>This functionality is not supported for directory buckets.</p>
                         </note>
                      </li>
                      <li>
                         <p>
                            <b>If-None-Match</b> - Uploads the object only if the object
                    key name does not already exist in the specified bucket. Otherwise, Amazon S3 returns a <code>412
                      Precondition Failed</code> error. If a conflicting operation occurs during the upload, S3 returns
                    a <code>409 ConditionalRequestConflict</code> response. On a 409 failure, retry the upload.</p>
                         <p>Expects the * character (asterisk).</p>
                         <p>For more information, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/conditional-requests.html">Add preconditions to S3 operations with
                      conditional requests</a> in the <i>Amazon S3 User Guide</i> or <a href="https://datatracker.ietf.org/doc/rfc7232/">RFC 7232</a>. </p>
                         <note>
                            <p>This functionality is not supported for S3 on Outposts.</p>
                         </note>
                      </li>
                      <li>
                         <p>
                            <b>S3 Versioning</b> - When you enable versioning for a bucket,
                    if Amazon S3 receives multiple write requests for the same object simultaneously, it stores all versions
                    of the objects. For each write request that is made to the same object, Amazon S3 automatically generates
                    a unique version ID of that object being stored in Amazon S3. You can retrieve, replace, or delete any
                    version of the object. For more information about versioning, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/dev/AddingObjectstoVersioningEnabledBuckets.html">Adding Objects to
                      Versioning-Enabled Buckets</a> in the <i>Amazon S3 User Guide</i>. For information
                    about returning the versioning state of a bucket, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/API/API_GetBucketVersioning.html">GetBucketVersioning</a>. </p>
                         <note>
                            <p>This functionality is not supported for directory buckets.</p>
                         </note>
                      </li>
                   </ul>
                   <dl>
                      <dt>Permissions</dt>
                      <dd>
                         <ul>
                            <li>
                               <p>
                                  <b>General purpose bucket permissions</b> - The following
                          permissions are required in your policies when your <code>PutObject</code> request includes
                          specific headers.</p>
                               <ul>
                                  <li>
                                     <p>
                                        <b>
                                           <code>s3:PutObject</code>
                                        </b> - To successfully
                              complete the <code>PutObject</code> request, you must always have the
                                <code>s3:PutObject</code> permission on a bucket to add an object to it.</p>
                                  </li>
                                  <li>
                                     <p>
                                        <b>
                                           <code>s3:PutObjectAcl</code>
                                        </b> - To successfully change the objects ACL of your <code>PutObject</code>
                              request, you must have the <code>s3:PutObjectAcl</code>.</p>
                                  </li>
                                  <li>
                                     <p>
                                        <b>
                                           <code>s3:PutObjectTagging</code>
                                        </b> - To successfully set the tag-set with your <code>PutObject</code>
                              request, you must have the <code>s3:PutObjectTagging</code>.</p>
                                  </li>
                               </ul>
                            </li>
                            <li>
                               <p>
                                  <b>Directory bucket permissions</b> - To grant access to this API operation on a directory bucket, we recommend that you use the <a href="https://docs.aws.amazon.com/AmazonS3/latest/API/API_CreateSession.html">
                                     <code>CreateSession</code>
                                  </a> API operation for session-based authorization. Specifically, you grant the <code>s3express:CreateSession</code> permission to the directory bucket in a bucket policy or an IAM identity-based policy. Then, you make the <code>CreateSession</code> API call on the bucket to obtain a session token. With the session token in your request header, you can make API requests to this operation. After the session token expires, you make another <code>CreateSession</code> API call to generate a new session token for use. 
          Amazon Web Services CLI or SDKs create session and refresh the session token automatically to avoid service interruptions when a session expires. For more information about authorization, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/API/API_CreateSession.html">
                                     <code>CreateSession</code>
                                  </a>.</p>
                               <p>If the object is encrypted with SSE-KMS, you must also have the
                            <code>kms:GenerateDataKey</code> and <code>kms:Decrypt</code> permissions in IAM
                          identity-based policies and KMS key policies for the KMS key.</p>
                            </li>
                         </ul>
                      </dd>
                      <dt>Data integrity with Content-MD5</dt>
                      <dd>
                         <ul>
                            <li>
                               <p>
                                  <b>General purpose bucket</b> - To ensure that data is not
                          corrupted traversing the network, use the <code>Content-MD5</code> header. When you use this
                          header, Amazon S3 checks the object against the provided MD5 value and, if they do not match, Amazon S3
                          returns an error. Alternatively, when the object's ETag is its MD5 digest, you can calculate
                          the MD5 while putting the object to Amazon S3 and compare the returned ETag to the calculated MD5
                          value.</p>
                            </li>
                            <li>
                               <p>
                                  <b>Directory bucket</b> -
                          This functionality is not supported for directory buckets.</p>
                            </li>
                         </ul>
                      </dd>
                      <dt>HTTP Host header syntax</dt>
                      <dd>
                         <p>
                            <b>Directory buckets </b> - The HTTP Host header syntax is <code>
                               <i>Bucket-name</i>.s3express-<i>zone-id</i>.<i>region-code</i>.amazonaws.com</code>.</p>
                      </dd>
                   </dl>
                   <dl>
                      <dt>Errors</dt>
                      <dd>
                         <ul>
                            <li>
                               <p>You might receive an <code>InvalidRequest</code> error for several reasons. Depending on the reason for the error, you might receive one of the following messages:</p>
                               <ul>
                                  <li>
                                     <p>Cannot specify both a write offset value and user-defined object metadata for existing
                              objects.</p>
                                  </li>
                                  <li>
                                     <p>Checksum Type mismatch occurred, expected checksum Type: sha1, actual checksum Type:
                              crc32c.</p>
                                  </li>
                                  <li>
                                     <p>Request body cannot be empty when 'write offset' is specified.</p>
                                  </li>
                               </ul>
                            </li>
                         </ul>
                      </dd>
                   </dl>
                   <p>For more information about related Amazon S3 APIs, see the following:</p>
                   <ul>
                      <li>
                         <p>
                            <a href="https://docs.aws.amazon.com/AmazonS3/latest/API/API_CopyObject.html">CopyObject</a>
                         </p>
                      </li>
                      <li>
                         <p>
                            <a href="https://docs.aws.amazon.com/AmazonS3/latest/API/API_DeleteObject.html">DeleteObject</a>
                         </p>
                      </li>
                   </ul>
                   <important>
                      <p>You must URL encode any signed header values that contain spaces. For example, if your header value is <code>my  file.txt</code>, containing two spaces after <code>my</code>, you must URL encode this value to <code>my%20%20file.txt</code>.</p>
                   </important>
      parameters: 
        - 
          name: x-amz-acl
          in: header
          required: false
          description: |
              <p>The canned access control list (ACL) to apply to the object.</p>
                       <p>When you copy an object, the ACL metadata is not preserved and is set to <code>private</code> by
                    default. Only the owner has full access control. To override the default ACL setting, specify a new ACL
                    when you generate a copy request. For more information, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/dev/S3_ACLs_UsingACLs.html">Using ACLs</a>. </p>
                       <p>If the destination bucket that you're copying objects to uses the bucket owner enforced setting for
                    S3 Object Ownership, ACLs are disabled and no longer affect permissions. Buckets that use this setting
                    only accept <code>PUT</code> requests that don't specify an ACL or <code>PUT</code> requests that
                    specify bucket owner full control ACLs, such as the <code>bucket-owner-full-control</code> canned ACL or
                    an equivalent form of this ACL expressed in the XML format. For more information, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/about-object-ownership.html">Controlling ownership
                      of objects and disabling ACLs</a> in the <i>Amazon S3 User Guide</i>.</p>
                       <note>
                          <ul>
                             <li>
                                <p>If your destination bucket uses the bucket owner enforced setting for Object Ownership, all
                          objects written to the bucket by any account will be owned by the bucket owner.</p>
                             </li>
                             <li>
                                <p>This functionality is not supported for directory buckets.</p>
                             </li>
                             <li>
                                <p>This functionality is not supported for Amazon S3 on Outposts.</p>
                             </li>
                          </ul>
                       </note>
          schema: 
            type: string
        - 
          name: Bucket
          in: path
          required: true
          description: |
              <p>The name of the destination bucket.</p>
                       <p>
                          <b>Directory buckets</b> - When you use this operation with a directory bucket, you must use virtual-hosted-style requests in the format <code>
                             <i>Bucket-name</i>.s3express-<i>zone-id</i>.<i>region-code</i>.amazonaws.com</code>. Path-style requests are not supported.  Directory bucket names must be unique in the chosen Zone (Availability Zone or Local Zone). Bucket names must follow the format <code>
                             <i>bucket-base-name</i>--<i>zone-id</i>--x-s3</code> (for example, <code>
                             <i>amzn-s3-demo-bucket</i>--<i>usw2-az1</i>--x-s3</code>). For information about bucket naming
                       restrictions, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/directory-bucket-naming-rules.html">Directory bucket naming
                          rules</a> in the <i>Amazon S3 User Guide</i>.</p>
                       <note>
                          <p>Copying objects across different Amazon Web Services Regions isn't supported when the source or destination
                      bucket is in Amazon Web Services Local Zones. The source and destination buckets must have the same parent Amazon Web Services Region.
                      Otherwise, you get an HTTP <code>400 Bad Request</code> error with the error code
                        <code>InvalidRequest</code>.</p>
                       </note>
                       <p>
                          <b>Access points</b> - When you use this action with an access point for general purpose buckets, you must provide the alias of the access point in place of the bucket name or specify the access point ARN. When you use this action with an access point for directory buckets, you must provide the access point name in place of the bucket name. When using the access point ARN, you must direct requests to the access point hostname. The access point hostname takes the form <i>AccessPointName</i>-<i>AccountId</i>.s3-accesspoint.<i>Region</i>.amazonaws.com. When using this action with an access point through the Amazon Web Services SDKs, you provide the access point ARN in place of the bucket name. For more information about access point ARNs, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/using-access-points.html">Using access points</a> in the <i>Amazon S3 User Guide</i>.</p>
                       <note>
                          <p>Object Lambda access points are not supported by directory buckets.</p>
                       </note>
                       <p>
                          <b>S3 on Outposts</b> - When you use this action with S3 on Outposts,
                    you must use the Outpost bucket access point ARN or the access point alias for the destination bucket.
                    You can only copy objects within the same Outpost bucket. It's not supported to copy objects across
                    different Amazon Web Services Outposts, between buckets on the same Outposts, or between Outposts buckets and any
                    other bucket types. For more information about S3 on Outposts, see <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/S3onOutposts.html">What is S3 on Outposts?</a> in the
                      <i>S3 on Outposts guide</i>. When you use this action with S3 on Outposts through the REST
                    API, you must direct requests to the S3 on Outposts hostname, in the format
                        <code>
                             <i>AccessPointName</i>-<i>AccountId</i>.<i>outpostID</i>.s3-outposts.<i>Region</i>.amazonaws.com</code>.
                    The hostname isn't required when you use the Amazon Web Services CLI or SDKs. </p>
          schema: 
            type: string
        - 
          name: Cache-Control
          in: header
          required: false
          description: "<p>Specifies the caching behavior along the request/reply chain.</p>"
          schema: 
            type: string
        - 
          name: x-amz-checksum-algorithm
          in: header
          required: false
          description: |
              <p>Indicates the algorithm that you want Amazon S3 to use to create the checksum for the object. For more information, see
                  <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/checking-object-integrity.html">Checking object integrity</a> in
                  the <i>Amazon S3 User Guide</i>.</p>
                       <p>When you copy an object, if the source object has a checksum, that checksum value will be copied to
                    the new object by default. If the <code>CopyObject</code> request does not include this
                      <code>x-amz-checksum-algorithm</code> header, the checksum algorithm will be copied from the source
                    object to the destination object (if it's present on the source object). You can optionally specify a
                    different checksum algorithm to use with the <code>x-amz-checksum-algorithm</code> header. Unrecognized
                    or unsupported values will respond with the HTTP status code <code>400 Bad Request</code>.</p>
                       <note>
                          <p>For directory buckets, when you use Amazon Web Services SDKs, <code>CRC32</code> is the default checksum algorithm that's used for performance.</p>
                       </note>
          schema: 
            type: string
        - 
          name: Content-Disposition
          in: header
          required: false
          description: |
              <p>Specifies presentational information for the object. Indicates whether an object should be displayed
                    in a web browser or downloaded as a file. It allows specifying the desired filename for the downloaded
                    file.</p>
          schema: 
            type: string
        - 
          name: Content-Encoding
          in: header
          required: false
          description: |
              <p>Specifies what content encodings have been applied to the object and thus what decoding mechanisms
                    must be applied to obtain the media-type referenced by the Content-Type header field.</p>
                       <note>
                          <p>For directory buckets, only the <code>aws-chunked</code> value is supported in this header field.</p>
                       </note>
          schema: 
            type: string
        - 
          name: Content-Language
          in: header
          required: false
          description: "<p>The language the content is in.</p>"
          schema: 
            type: string
        - 
          name: Content-Type
          in: header
          required: false
          description: "<p>A standard MIME type that describes the format of the object data.</p>"
          schema: 
            type: string
        - 
          name: x-amz-copy-source
          in: header
          required: true
          description: |
              <p>Specifies the source object for the copy operation. The source object can be up to 5 GB. If the
                    source object is an object that was uploaded by using a multipart upload, the object copy will be a
                    single part object after the source object is copied to the destination bucket.</p>
                       <p>You specify the value of the copy source in one of two formats, depending on whether you want to
                    access the source object through an <a href="https://docs.aws.amazon.com/AmazonS3/latest/userguide/access-points.html">access point</a>:</p>
                       <ul>
                          <li>
                             <p>For objects not accessed through an access point, specify the name of the source bucket and the key of
                        the source object, separated by a slash (/). For example, to copy the object
                          <code>reports/january.pdf</code> from the general purpose bucket <code>awsexamplebucket</code>, use
                          <code>awsexamplebucket/reports/january.pdf</code>. The value must be URL-encoded. To copy the
                        object <code>reports/january.pdf</code> from the directory bucket
                          <code>awsexamplebucket--use1-az5--x-s3</code>, use
                          <code>awsexamplebucket--use1-az5--x-s3/reports/january.pdf</code>. The value must be
                        URL-encoded.</p>
                          </li>
                          <li>
                             <p>For objects accessed through access points, specify the Amazon Resource Name (ARN) of the object as accessed through the access point, in the format <code>arn:aws:s3:<Region>:<account-id>:accesspoint/<access-point-name>/object/<key></code>. For example, to copy the object <code>reports/january.pdf</code> through access point <code>my-access-point</code> owned by account <code>123456789012</code> in Region <code>us-west-2</code>, use the URL encoding of <code>arn:aws:s3:us-west-2:123456789012:accesspoint/my-access-point/object/reports/january.pdf</code>. The value must be URL encoded.</p>
                             <note>
                                <ul>
                                   <li>
                                      <p>Amazon S3 supports copy operations using Access points only when the source and destination buckets are in the same Amazon Web Services Region.</p>
                                   </li>
                                   <li>
                                      <p>Access points are not supported by directory buckets.</p>
                                   </li>
                                </ul>
                             </note>
                             <p>Alternatively, for objects accessed through Amazon S3 on Outposts, specify the ARN of the object as accessed in the format <code>arn:aws:s3-outposts:<Region>:<account-id>:outpost/<outpost-id>/object/<key></code>. For example, to copy the object <code>reports/january.pdf</code> through outpost <code>my-outpost</code> owned by account <code>123456789012</code> in Region <code>us-west-2</code>, use the URL encoding of <code>arn:aws:s3-outposts:us-west-2:123456789012:outpost/my-outpost/object/reports/january.pdf</code>. The value must be URL-encoded.  </p>
                          </li>
                       </ul>
                       <p>If your source bucket versioning is enabled, the <code>x-amz-copy-source</code> header by default
                    identifies the current version of an object to copy. If the current version is a delete marker, Amazon S3
                    behaves as if the object was deleted. To copy a different version, use the <code>versionId</code> query
                    parameter. Specifically, append <code>?versionId=<version-id></code> to the value (for example,
                      <code>awsexamplebucket/reports/january.pdf?versionId=QUpfdndhfd8438MNFDN93jdnJFkdmqnh893</code>). If
                    you don't specify a version ID, Amazon S3 copies the latest version of the source object.</p>
                       <p>If you enable versioning on the destination bucket, Amazon S3 generates a unique version ID for the
                    copied object. This version ID is different from the version ID of the source object. Amazon S3 returns the
                    version ID of the copied object in the <code>x-amz-version-id</code> response header in the
                    response.</p>
                       <p>If you do not enable versioning or suspend it on the destination bucket, the version ID that Amazon S3
                    generates in the <code>x-amz-version-id</code> response header is always null.</p>
                       <note>
                          <p>
                             <b>Directory buckets</b> - S3 Versioning isn't enabled and supported for directory buckets.</p>
                       </note>
          schema: 
            type: string
        - 
          name: x-amz-copy-source-if-match
          in: header
          required: false
          description: |
              <p>Copies the object if its entity tag (ETag) matches the specified tag.</p>
                       <p> If both the <code>x-amz-copy-source-if-match</code> and
                      <code>x-amz-copy-source-if-unmodified-since</code> headers are present in the request and evaluate as
                    follows, Amazon S3 returns <code>200 OK</code> and copies the data:</p>
                       <ul>
                          <li>
                             <p>
                                <code>x-amz-copy-source-if-match</code> condition evaluates to true</p>
                          </li>
                          <li>
                             <p>
                                <code>x-amz-copy-source-if-unmodified-since</code> condition evaluates to false</p>
                          </li>
                       </ul>
          schema: 
            type: string
        - 
          name: x-amz-copy-source-if-modified-since
          in: header
          required: false
          description: |
              <p>Copies the object if it has been modified since the specified time.</p>
                       <p>If both the <code>x-amz-copy-source-if-none-match</code> and
                      <code>x-amz-copy-source-if-modified-since</code> headers are present in the request and evaluate as
                    follows, Amazon S3 returns the <code>412 Precondition Failed</code> response code:</p>
                       <ul>
                          <li>
                             <p>
                                <code>x-amz-copy-source-if-none-match</code> condition evaluates to false</p>
                          </li>
                          <li>
                             <p>
                                <code>x-amz-copy-source-if-modified-since</code> condition evaluates to true</p>
                          </li>
                       </ul>
          schema: 
            type: string
        - 
          name: x-amz-copy-source-if-none-match
          in: header
          required: false
          description: |
              <p>Copies the object if its entity tag (ETag) is different than the specified ETag.</p>
                       <p>If both the <code>x-amz-copy-source-if-none-match</code> and
                      <code>x-amz-copy-source-if-modified-since</code> headers are present in the request and evaluate as
                    follows, Amazon S3 returns the <code>412 Precondition Failed</code> response code:</p>
                       <ul>
                          <li>
                             <p>
                                <code>x-amz-copy-source-if-none-match</code> condition evaluates to false</p>
                          </li>
                          <li>
                             <p>
                                <code>x-amz-copy-source-if-modified-since</code> condition evaluates to true</p>
                          </li>
                       </ul>
          schema: 
            type: string
        - 
          name: x-amz-copy-source-if-unmodified-since
          in: header
          required: false
          description: |
              <p>Copies the object if it hasn't been modified since the specified time.</p>
                       <p> If both the <code>x-amz-copy-source-if-match</code> and
                      <code>x-amz-copy-source-if-unmodified-since</code> headers are present in the request and evaluate as
                    follows, Amazon S3 returns <code>200 OK</code> and copies the data:</p>
                       <ul>
                          <li>
                             <p>
                                <code>x-amz-copy-source-if-match</code> condition evaluates to true</p>
                          </li>
                          <li>
                             <p>
                                <code>x-amz-copy-source-if-unmodified-since</code> condition evaluates to false</p>
                          </li>
                       </ul>
          schema: 
            type: string
        - 
          name: Expires
          in: header
          required: false
          description: "<p>The date and time at which the object is no longer cacheable.</p>"
          schema: 
            type: string
        - 
          name: x-amz-grant-full-control
          in: header
          required: false
