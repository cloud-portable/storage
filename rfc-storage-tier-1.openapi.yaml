          schema: 
            type: string
        - 
          name: fetch-owner
          in: query
          required: false
          description: |
              <p>The owner field is not present in <code>ListObjectsV2</code> by default. If you want to return the
                    owner field with each key in the result, then set the <code>FetchOwner</code> field to
